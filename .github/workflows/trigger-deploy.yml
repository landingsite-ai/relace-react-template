name: Trigger Modal Deploy
on:
  push:
    branches: [main]
    # When the template changes, the Modal gold image needs a force rebuild
    # to pick up the new code (it clones this repo during image build).

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.TEMPLATE_APP_ID }}
          private-key: ${{ secrets.TEMPLATE_APP_PRIVATE_KEY }}
          owner: landingsite-ai
          repositories: landingsite-modal

      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: landingsite-ai/landingsite-modal
          event-type: template-updated
